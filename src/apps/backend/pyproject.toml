[tool.autoflake]
name = '*.py'
recursive = true
remove-all-unused-imports = true
remove-unused-variables = true
ignore-pass-after-docstring = true

[tool.black]
line-length = 120
skip-magic-trailing-comma = true
target-version = ['py311']

[tool.isort]
line_length = 120
multi_line_output = 3
profile = "black"
py_version = "311"

[tool.vulture]
exclude = []
ignore_decorators = []
ignore_names = []
min_confidence = 90
paths = [
  "modules",
  "bin",
  "./web_app.py",
  "./worker_app.py",
]
sort_by_size = true

[tool.importlinter]
root_package = "modules"

[[tool.importlinter.contracts]]
name = "module internals are private to their owning module"
type = "forbidden"
source_modules = ["modules.*"]
forbidden_modules = ["modules.*.internal"]
allow_indirect_imports = true
