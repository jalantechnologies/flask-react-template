logger:
  transports:
    - 'console'
    - 'datadog'

sms:
  enabled: true

is_server_running_behind_proxy: true

web:
  csp_script_src_extra:
    - 'https://cdn.inspectlet.com'
  csp_connect_src_extra:
    - 'https://*.datadoghq.com'
    - 'https://*.inspectlet.com'

public:
  authenticationMechanism: 'EMAIL' #or 'PHONE'
  datadog:
    enabled: 'true'
  default_otp:
    enabled: true
    code: '1234'

account:
  enable_bootstrap_tasks: true
  create_test_user_account: true
  test_user:
    first_name: 'Preview'
    last_name: 'User'
    username: 'preview@example.com'
    password: 'previewpassword'

BOOTSTRAP_APP: true
