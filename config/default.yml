server:
  port: 8080

is_server_running_behind_proxy: false

mongodb:
  connection_caching: true

web_app_host: 'http://localhost:3000'

web:
  cors_allowed_origin: 'http://localhost:3000'
  csp_script_src_extra: []
  csp_connect_src_extra: []

logger:
  transports: ['console']

datadog:
  app_name: 'flask-react-template'
  site_name: 'datadoghq.com'
  log_level: 'info'

accounts:
  token_signing_key: 'JWT_TOKEN'
  token_expiry_days: 1
  token_expires_in_seconds: 3600
  create_test_user_account: false
  test_user:
    first_name: 'Test'
    last_name: 'User'
    username: 'test@example.com'
    password: 'testpassword'

public:
  authenticationMechanism: 'EMAIL' #or 'PHONE'
  datadog:
    enabled: 'false'

BOOTSTRAP_APP: false
